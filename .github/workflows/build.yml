name: Make CI

on:
  push:
    branches: [ main ]
  release:
    types:
      - published
  pull_request:
  workflow_dispatch:
    
jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        linkage: [dynamic, static]

    steps:
    - uses: actions/checkout@v7
  
    - name: Install dependencies
      run: sudo apt-get install -y libudev-dev libhidapi-dev

    - name: Cache hidapi static
      if: matrix.linkage == 'static'
      uses: actions/cache@v4
      id: cache-hidapi
      with:
        path: /usr/local/lib/libhidapi-libusb.a
        key: hidapi-static-linux-v1

    - name: Build hidapi static
      if: matrix.linkage == 'static' && steps.cache-hidapi.outputs.cache-hit != 'true'
      run: |
        sudo apt-get install -y libusb-1.0-0-dev autoconf automake libtool
        git clone --depth 1 https://github.com/libusb/hidapi.git
        cd hidapi && ./bootstrap && ./configure --enable-static --disable-shared
        make && sudo make install
    
    - name: Compile
      run: make clean ${{ matrix.linkage == 'static' && 'static' || '' }} package ${{ matrix.linkage == 'static' && 'STATIC=1' || '' }}

    - uses: actions/upload-artifact@v7
      with:
        name: SonixFlasherC-Linux-${{ matrix.linkage }}
        path: sonixflasher-*.zip
  
  build-mac:
    runs-on: macos-latest
    strategy:
      matrix:
        linkage: [dynamic, static]
    env:
      CPATH: /opt/homebrew/include
      LIBRARY_PATH: /opt/homebrew/lib

    steps:
    - uses: actions/checkout@v7

    - name: Install dependencies
      run: brew install hidapi

    - name: Cache hidapi static
      if: matrix.linkage == 'static'
      uses: actions/cache@v4
      id: cache-hidapi
      with:
        path: /opt/homebrew/lib/libhidapi.a
        key: hidapi-static-macos-v1

    - name: Build hidapi static
      if: matrix.linkage == 'static' && steps.cache-hidapi.outputs.cache-hit != 'true'
      run: |
        brew install autoconf automake libtool
        git clone --depth 1 https://github.com/libusb/hidapi.git
        cd hidapi && ./bootstrap && ./configure --enable-static --disable-shared --prefix=/opt/homebrew
        make && sudo make install

    - name: Compile
      run: make clean ${{ matrix.linkage == 'static' && 'static' || '' }} package ${{ matrix.linkage == 'static' && 'STATIC=1' || '' }}

    - uses: actions/upload-artifact@v7
      with:
        name: SonixFlasherC-macOS-${{ matrix.linkage }}
        path: sonixflasher-*.zip
        
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        linkage: [dynamic, static]
    defaults:
      run:
        shell: msys2 {0}

    steps:
    - uses: actions/checkout@v7
    - uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: make p7zip mingw-w64-x86_64-cc mingw-w64-x86_64-pkg-config mingw-w64-x86_64-hidapi

    - name: Cache hidapi static
      if: matrix.linkage == 'static'
      uses: actions/cache@v4
      id: cache-hidapi
      with:
        path: /mingw64/lib/libhidapi.a
        key: hidapi-static-windows-v1

    - name: Build hidapi static
      if: matrix.linkage == 'static' && steps.cache-hidapi.outputs.cache-hit != 'true'
      run: |
        pacman -S --noconfirm autoconf automake libtool git
        git clone --depth 1 https://github.com/libusb/hidapi.git
        cd hidapi && ./bootstrap && ./configure --enable-static --disable-shared
        make && make install
    
    - name: Compile
      run: make clean ${{ matrix.linkage == 'static' && 'static' || '' }} sonixflasher package ${{ matrix.linkage == 'static' && 'STATIC=1' || '' }}

    - uses: actions/upload-artifact@v7
      with:
        name: SonixFlasherC-Windows-${{ matrix.linkage }}
        path: sonixflasher-*.zip

  publish_release:
    name: Publish (Release)
    runs-on: ubuntu-latest

    needs: [build-linux, build-mac, build-windows]

    if: github.event.release.tag_name

    steps:
    - uses: actions/download-artifact@v8

    - uses: softprops/action-gh-release@v3
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        name: ${{ github.event.release.name }}
        files: |
          ${{ github.workspace }}/*/*
        fail_on_unmatched_files: true